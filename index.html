<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>طلب عرض سعر مكيفات | SMOU GROUP</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:"Tajawal",sans-serif;
  background:#071320;
  color:#fff;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  font-weight:800;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.field{
  display:flex;
  flex-direction:column;
}

.field.full{
  grid-column:1/-1;
}

label{
  margin-bottom:6px;
  font-weight:700;
}

input,select,textarea{
  padding:12px;
  border-radius:12px;
  border:none;
  background:#1b2c3d;
  color:#fff;
  text-align:right;
}

textarea{
  min-height:80px;
}

.checkbox-wrap{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.actions{
  margin-top:20px;
  text-align:center;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:10px;
  background:#1ca767;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.priceBox{
  margin-top:20px;
}

.priceGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.priceItem{
  background:#1b2c3d;
  padding:12px;
  border-radius:10px;
}

.priceValue{
  font-size:20px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>طلب عرض سعر مكيفات</h1>

<form id="form" class="grid">

<div class="field">
<label>اسم العميل</label>
<input id="clientName">
</div>

<div class="field">
<label>رقم الهاتف</label>
<input id="phone">
</div>

<div class="field full">
<label>بيانات المكيف</label>
<div class="checkbox-wrap">
<label><input type="checkbox" name="acType" value="داكت"> داكت</label>
<label><input type="checkbox" name="acType" value="اسبليت"> اسبليت</label>
<label><input type="checkbox" name="acType" value="داكت + اسبليت"> الاثنين</label>
<label><input type="checkbox" name="acType" value="خدمات"> خدمات</label>
</div>
</div>

<div class="field">
<label>الحمولة (طن)</label>
<input id="capacity">
</div>

<div class="field full">
<label>البراندات المطلوبة</label>
<select id="requestedBrands"></select>
</div>

<div class="field">
<label>الداكت</label>
<select id="duct">
<option>GI</option>
<option>PI</option>
</select>
</div>

<div class="field">
<label>مواسير النحاس</label>
<select id="copper">
<option>MAKSAL</option>
<option>MUELLER</option>
</select>
</div>

<div class="field full">
<label>متطلبات خاصة</label>
<textarea id="notes"></textarea>
</div>

<!-- PRICES -->

<div class="field">
<label>السعر 1</label>
<input id="price1" type="number">
</div>

<div class="field">
<label>البراند 1</label>
<select id="brand1"></select>
</div>

<div class="field">
<label>السعر 2</label>
<input id="price2" type="number">
</div>

<div class="field">
<label>البراند 2</label>
<select id="brand2"></select>
</div>

<div class="field">
<label>السعر 3</label>
<input id="price3" type="number">
</div>

<div class="field">
<label>البراند 3</label>
<select id="brand3"></select>
</div>

<div class="field">
<label>السعر 4</label>
<input id="price4" type="number">
</div>

<div class="field">
<label>البراند 4</label>
<select id="brand4"></select>
</div>

</form>

<!-- DISPLAY -->

<div class="priceBox">
<div class="priceGrid">

<div class="priceItem">
<div id="p1" class="priceValue">0</div>
<div id="b1">-</div>
</div>

<div class="priceItem">
<div id="p2" class="priceValue">0</div>
<div id="b2">-</div>
</div>

<div class="priceItem">
<div id="p3" class="priceValue">0</div>
<div id="b3">-</div>
</div>

<div class="priceItem">
<div id="p4" class="priceValue">0</div>
<div id="b4">-</div>
</div>

</div>
</div>

<div class="actions">
<button onclick="update()">تحديث الأسعار</button>
</div>

</div>

<script>

const brands = `
<option value="">اختر البراند</option>
<option>Mitsubishi (ميتسوبيشي)</option>
<option>Ogeneral (او جنرال)</option>
<option>Carrier (كاريير)</option>
<option>Daikin (دايكن)</option>
<option>Super General (سوبر جنرال)</option>
<option>York (يورك)</option>
<option>Gree (جري)</option>
<option>Midea (ميديا)</option>
<option>Samsung (سامسونج)</option>
<option>Panasonic (باناسونيك)</option>
<option>LG (إل جي)</option>
<option>Hisense (هايسنس)</option>
<option>TCL (تي سي إل)</option>
<option>Toshiba (توشيبا)</option>
<option>Westpoint (ويست بوينت)</option>
<option>Akai (أكاي)</option>
`;

['requestedBrands','brand1','brand2','brand3','brand4'].forEach(id=>{
  document.getElementById(id).innerHTML = brands;
});

function update(){
  document.getElementById('p1').innerText = document.getElementById('price1').value || 0;
  document.getElementById('p2').innerText = document.getElementById('price2').value || 0;
  document.getElementById('p3').innerText = document.getElementById('price3').value || 0;
  document.getElementById('p4').innerText = document.getElementById('price4').value || 0;

  document.getElementById('b1').innerText = document.getElementById('brand1').value || '-';
  document.getElementById('b2').innerText = document.getElementById('brand2').value || '-';
  document.getElementById('b3').innerText = document.getElementById('brand3').value || '-';
  document.getElementById('b4').innerText = document.getElementById('brand4').value || '-';
}

</script>

</body>
</html>
