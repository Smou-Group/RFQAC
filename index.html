<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMOU Maintenance Report</title>

<style>
body{font-family:Tahoma;background:#f4f8ff;margin:0;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:25px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.1)}
h2{text-align:center;color:#0b5ed7}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input,textarea,select{padding:10px;border:1px solid #ccc;border-radius:8px;width:100%}
button{padding:12px;border:none;border-radius:10px;background:#0b5ed7;color:#fff;font-weight:bold;cursor:pointer}
.full{grid-column:1/-1}
#msg{text-align:center;margin-top:10px;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<h2>تقرير صيانة - SMOU GROUP</h2>

<div class="grid">

<input id="reportNo" readonly placeholder="Report No">
<input id="date" readonly>

<input id="time" readonly>
<input id="clientName" placeholder="اسم العميل">

<input id="phone" placeholder="رقم الهاتف">
<input id="contractNo" placeholder="رقم العقد">

<input id="address" class="full" placeholder="العنوان">

<textarea id="visitReason" class="full" placeholder="سبب الزيارة"></textarea>
<textarea id="actionTaken" class="full" placeholder="الإجراء"></textarea>
<textarea id="recommendations" class="full" placeholder="التوصيات"></textarea>

<input id="amount" placeholder="المبلغ">
<select id="technician">
<option value="">اختر الفني</option>
<option>Ahmed</option>
<option>Ali</option>
<option>Mohamed</option>
</select>

</div>

<br>
<button onclick="saveData()">💾 حفظ في Google Sheet</button>

<div id="msg"></div>

</div>

<script>
const SCRIPT_URL = "PUT_YOUR_SCRIPT_URL_HERE";

/* تشغيل الصفحة */
window.onload = function(){
  generateReportNo();
  setAutoDateTime();
};

/* رقم التقرير */
function generateReportNo(){
  let last = localStorage.getItem("reportNo") || 0;
  last++;
  localStorage.setItem("reportNo", last);

  const year = new Date().getFullYear();
  document.getElementById("reportNo").value =
    year + "-" + String(last).padStart(4,"0");
}

/* التاريخ والوقت */
function setAutoDateTime(){
  const now = new Date();
  document.getElementById("date").value = now.toISOString().split("T")[0];
  document.getElementById("time").value =
    now.getHours().toString().padStart(2,"0") + ":" +
    now.getMinutes().toString().padStart(2,"0");
}

/* حفظ */
async function saveData(){

  const data = {
    reportNo: reportNo.value,
    date: date.value,
    time: time.value,
    clientName: clientName.value,
    phone: phone.value,
    contractNo: contractNo.value,
    address: address.value,
    visitReason: visitReason.value,
    actionTaken: actionTaken.value,
    recommendations: recommendations.value,
    amount: amount.value,
    technician: technician.value
  };

  if(!data.clientName || !data.technician){
    msg.innerText = "❗ ادخل اسم العميل والفني";
    return;
  }

  msg.innerText = "جاري الحفظ...";

  try{
    const res = await fetch(SCRIPT_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if(result.status === "success"){
      msg.innerText = "✅ تم الحفظ بنجاح";
      setTimeout(()=>location.reload(),1000);
    }else{
      msg.innerText = "❌ فشل الحفظ";
    }

  }catch(e){
    msg.innerText = "❌ خطأ في الاتصال";
  }
}
</script>

</body>
</html>
