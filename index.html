```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMOU Group - Maintenance Report</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Tahoma,Arial;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  min-height:100vh;
  padding:10px;
}

.container{
  max-width:850px;
  margin:auto;
  background:#fff;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 25px 60px rgba(0,0,0,.45);
}

.header{
  background:linear-gradient(135deg,#1e3a8a,#3b82f6);
  color:white;
  padding:20px;
  text-align:center;
}

.logo{
  width:80px;
  height:80px;
  background:white;
  border-radius:16px;
  padding:8px;
  margin-bottom:8px;
}

.header p{color:#e0f2fe}

.title{
  text-align:center;
  background:#f8fafc;
  color:#1e3a8a;
  font-size:20px;
  font-weight:bold;
  padding:14px;
}

form{padding:14px}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

.field label{
  font-size:13px;
  font-weight:bold;
}

input,select,textarea{
  width:100%;
  padding:13px;
  border:1px solid #dbeafe;
  border-radius:14px;
}

.section-title{
  margin:16px 0 10px;
  padding:11px;
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  color:white;
  border-radius:12px;
  text-align:center;
}

.check-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#f9fbff;
  border:1px solid #dbeafe;
  border-radius:13px;
  padding:11px;
  margin-bottom:8px;
}

textarea{height:80px}

.buttons{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:15px;
}

button{
  border:none;
  color:white;
  padding:15px;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
}

.savepdf{background:linear-gradient(135deg,#16a34a,#22c55e)}
.downloadpdf{background:linear-gradient(135deg,#2563eb,#3b82f6)}
.close{background:linear-gradient(135deg,#dc2626,#ef4444)}

.pdf-wrapper{
  position:fixed;
  width:794px;
  height:1123px;
  background:white;
}

.pdf-page{
  width:794px;
  height:1123px;
  padding:20px;
  direction:rtl;
}

.pdf-header{
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  color:white;
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-radius:10px;
}

.pdf-qr{
  width:90px;
  height:90px;
  background:white;
  padding:5px;
  border-radius:10px;
}

.pdf-info{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-top:10px;
}

.pdf-box{
  border:1px solid #ddd;
  padding:6px;
  border-radius:6px;
  font-size:11px;
}

.pdf-items-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:5px;
  margin-top:10px;
}

.pdf-item{
  border:1px solid #ddd;
  padding:5px;
  font-size:10px;
  display:grid;
  grid-template-columns:30px 1fr 60px;
}

@media(min-width:700px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .buttons{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

<body>

<div class="container">
<div class="header">
<img src="logo.png" class="logo">
<h2>SMOU Group</h2>
<p>Elevators & AC</p>
</div>

<div class="title">تقرير صيانة المصعد</div>

<form id="form">

<div class="grid">
<input name="date" id="date" readonly>
<input name="time" id="time" readonly>
<input name="reportNo" id="reportNo" readonly>
<input name="contractNo" placeholder="Contract No">
<input name="customerName" placeholder="Customer">
<input name="location" placeholder="Location">
<select name="technician">
<option>Ahmed</option>
<option>Ali</option>
</select>
</div>

<div class="section-title">Checklist</div>
<div id="items"></div>

<textarea name="notes" placeholder="Notes"></textarea>

<div class="buttons">
<button type="button" class="savepdf" onclick="saveAndSharePDF()">حفظ + إرسال</button>
<button type="button" class="downloadpdf" onclick="downloadPDFOnly()">PDF فقط</button>
<button type="button" class="close" onclick="window.close()">إغلاق</button>
</div>

</form>
</div>

<script>
const items=["Check AC","Check brake","Check oil","Check ropes"];
const box=document.getElementById("items");

items.forEach((t,i)=>{
box.innerHTML+=`<label class="check-item">${t}<input type="checkbox" name="item${i}"></label>`;
});

function init(){
const now=new Date();
date.value=now.toLocaleDateString();
time.value=now.toLocaleTimeString();
reportNo.value=Math.floor(Math.random()*100000);
}
init();

async function createPDF(data){
let qr=await QRCode.toDataURL(
`https://smougroup.com/report?id=${data.reportNo}
Report ${data.reportNo}`,
{width:120}
);

let wrap=document.createElement("div");
wrap.className="pdf-wrapper";

wrap.innerHTML=`
<div class="pdf-page">
<div class="pdf-header">
<div>SMOU</div>
<div>${data.reportNo}</div>
<img src="${qr}" class="pdf-qr">
</div>

<div class="pdf-info">
<div class="pdf-box">${data.contractNo||""}</div>
<div class="pdf-box">${data.customerName||""}</div>
<div class="pdf-box">${data.location||""}</div>
</div>

<div class="pdf-items-grid">
${items.map((t,i)=>`
<div class="pdf-item">
<div>${i+1}</div>
<div>${t}</div>
<div>${data["item"+i]?"✔":"✖"}</div>
</div>`).join("")}
</div>

</div>
`;

document.body.appendChild(wrap);

let canvas=await html2canvas(wrap);
let img=canvas.toDataURL("image/jpeg");

const {jsPDF}=window.jspdf;
let pdf=new jsPDF({unit:"px",format:[794,1123]});
pdf.addImage(img,"JPEG",0,0,794,1123);
pdf.save("report.pdf");

wrap.remove();
}

function collect(){
let f=new FormData(form);
return Object.fromEntries(f.entries());
}

function downloadPDFOnly(){
createPDF(collect());
}

function saveAndSharePDF(){
createPDF(collect());
}
</script>

</body>
</html>
```
