<script>
const SCRIPT_URL = "PUT_YOUR_SCRIPT_URL_HERE";

/* توليد رقم التقرير */
function generateReportNo(){
  let last = localStorage.getItem("reportNo") || 0;
  last++;
  localStorage.setItem("reportNo", last);

  const year = new Date().getFullYear();
  document.getElementById("reportNo").value = year + "-" + String(last).padStart(4,"0");
}

/* التاريخ والوقت */
function setAutoDateTime(){
  const now = new Date();

  document.getElementById("date").value = now.toISOString().split("T")[0];
  document.getElementById("time").value =
    String(now.getHours()).padStart(2,"0") + ":" +
    String(now.getMinutes()).padStart(2,"0");
}

/* تجميع البيانات */
function getData(){
  return {
    reportNo: document.getElementById("reportNo").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    clientName: document.getElementById("clientName").value,
    phone: document.getElementById("phone").value,
    contractNo: document.getElementById("contractNo").value,
    address: document.getElementById("address").value,
    visitReason: document.getElementById("visitReason").value,
    actionTaken: document.getElementById("actionTaken").value,
    recommendations: document.getElementById("recommendations").value,
    amount: document.getElementById("amount").value,
    technician: document.getElementById("technician").value
  };
}

/* تعبئة التقرير */
function fillReport(){
  const d = getData();

  document.getElementById("r1").innerText = d.reportNo;
  document.getElementById("r2").innerText = d.date;
  document.getElementById("r3").innerText = d.time;
  document.getElementById("r4").innerText = d.clientName;
  document.getElementById("r5").innerText = d.phone;
  document.getElementById("r6").innerText = d.contractNo;
  document.getElementById("r7").innerText = d.address;
  document.getElementById("r8").innerText = d.visitReason;
  document.getElementById("r9").innerText = d.actionTaken;
  document.getElementById("r10").innerText = d.recommendations;
  document.getElementById("r11").innerText = d.amount ? d.amount + " AED" : "";
  document.getElementById("r12").innerText = d.technician;
}

/* حفظ في الشيت */
async function saveData(){
  fillReport();
  const d = getData();

  if(!d.clientName || !d.technician){
    document.getElementById("msg").innerText = "يرجى إدخال اسم العميل واختيار الفني";
    return;
  }

  document.getElementById("msg").innerText = "جاري الحفظ...";

  try{
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(d)
    });

    const result = await res.json();

    if(result.status === "success"){
      document.getElementById("msg").innerText = "✅ تم الحفظ بنجاح";

      setTimeout(()=> location.reload(), 1200);
    } else {
      document.getElementById("msg").innerText = "❌ فشل الحفظ";
    }

  }catch(e){
    document.getElementById("msg").innerText = "❌ خطأ في الاتصال";
  }
}

/* تحديث تلقائي */
document.querySelectorAll("input, textarea, select").forEach(el=>{
  el.addEventListener("input", fillReport);
});

/* تشغيل عند فتح الصفحة */
generateReportNo();
setAutoDateTime();
fillReport();
</script>
